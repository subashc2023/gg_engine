[package]
name = "gg_engine"
version = "0.1.0"
edition = "2021"
license = "MIT"

[features]
default = ["profiling"]
profiling = []

[dependencies]
log = { version = "0.4", features = ["release_max_level_info"] }
winit = "0.30"
ash = "0.38"
ash-window = "0.13"
raw-window-handle = "0.6"
egui = "0.33"
egui-winit = { version = "0.33", default-features = false }
egui-ash-renderer = "0.11"
glam = "0.29"
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
