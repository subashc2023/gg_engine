# cargo-deny configuration for GGEngine
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

# --- Advisories (known vulnerabilities & unmaintained crates) ---
[advisories]
ignore = [
    # Transitive deps from rapier/kira — no direct fix available, not security vulnerabilities
    { id = "RUSTSEC-2024-0384", reason = "`instant` is unmaintained but not vulnerable; pulled in by rapier/kira transitive deps" },
    { id = "RUSTSEC-2024-0436", reason = "`paste` is unmaintained but not vulnerable; pulled in by kira transitive deps" },
]

# --- Licenses ---
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "CC0-1.0",
    "MPL-2.0",
    "Zlib",
    "0BSD",
    "Unlicense",
    "Unicode-3.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
    "LGPL-2.1-or-later",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

# --- Bans (duplicate / forbidden crates) ---
[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"

# --- Sources (must come from crates.io) ---
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
